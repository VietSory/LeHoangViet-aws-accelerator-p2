server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 48h

backend_worker:
  compaction:
    block_retention: 48h
