apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/VietSory/LeHoangViet-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w9/day-a/apps/web/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
