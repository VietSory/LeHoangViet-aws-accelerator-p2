server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: student-web-api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: student-web-api
          service: student-web-api
          __path__: /logs/app.log
