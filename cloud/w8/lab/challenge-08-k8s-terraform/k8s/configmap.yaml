apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content
  labels:
    app: web
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Kubernetes Challenge 08</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          margin: 0;
        }
        .card {
          background: #1e293b;
          border: 1px solid #334155;
          border-radius: 16px;
          padding: 40px;
          max-width: 720px;
        }
        h1 { color: #f59e0b; margin-top: 0; }
        code { color: #38bdf8; }
        .ok { color: #22c55e; font-weight: bold; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Kubernetes Challenge 08</h1>
        <p class="ok">Application is running successfully.</p>
        <p>Student: Le Hoang Viet</p>
        <p>Architecture:</p>
        <p><code>ALB -> EC2 -> Minikube NodePort -> Nginx Pods</code></p>
        <p>Provisioned by Terraform and cloud-init.</p>
      </div>
    </body>
    </html>
